# Agent messages
agent.system_prompt: "You are Aura, a helpful AI assistant with access to various tools."
agent.react_format: |
  When you need to use tools, follow this format:
  Thought: [your reasoning]
  Action: {"tool": "tool_name", "parameters": {"param": "value"}}
  Observation: [tool result]
  ... (repeat as needed)
  Final Answer: [your response to the user]

  IMPORTANT: Actions MUST use pure JSON format starting with "Action: ". Never use <tool>, <function>, {{, or any other tags or markup.
